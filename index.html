<!DOCTYPE html>
<html>
<head>
<title>Async Weather Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🌤 Async Weather Tracker</h2>

<div class="container">

<!-- CARD 1 -->
<div class="card">

<label>Search City</label>

<input type="text" id="cityInput" placeholder="Delhi, London">

<button id="searchBtn">Search</button>

<h4>Search History</h4>

<div id="history"></div>

</div>

<!-- CARD 2 -->
<div class="card">

<h4>Weather Info</h4>

<div id="weatherInfo">
City not found
</div>

</div>

</div>

<!-- CARD 3 -->
<div class="consoleCard">

<h4>Console – Event Loop</h4>

<pre id="consoleLog"></pre>

</div>

<script src="script.js"></script>

</body>
</html>
